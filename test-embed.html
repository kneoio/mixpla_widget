<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mixpla Widget — Embed Test</title>
  <link rel="stylesheet" href="dist/style.css" />
  <style>
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      margin: 0;
      font-family: sans-serif;
      color: #888;
    }
    h2 { color: #fff; margin: 0 0 8px; }
    .section { text-align: center; }
    code { background: #222; color: #e63946; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="section">
    <h2>Two widgets — independent</h2>
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
      <mixpla-player slug="sunonation" label="Sunonation"></mixpla-player>
      <mixpla-player slug="lumisonic" label="Lumisonic"></mixpla-player>
    </div>
  </div>

  <p>Open browser console to see stream logs.</p>

  <script src="dist/mixpla-widget.iife.js"></script>
</body>
</html>
